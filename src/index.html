<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="canonical" href="https://kamedma.com/" />

    <!-- Primary Meta Tags -->
    <title>KAME | Zambia's Leading Business Visibility Agency</title>
    <meta name="title" content="KAME | Zambia's Leading Business Visibility Agency" />
    <meta name="description" content="KAME builds the visibility, trust, and relevance systems that make Zambian businesses easy to find, verify, and choose — on Google and in AI search." />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="English" />
    <meta name="author" content="KAME Digital Marketing Agency" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://kamedma.com/" />
    <meta property="og:title" content="KAME | Zambia's Leading Business Visibility Agency" />
    <meta property="og:description" content="KAME builds the visibility, trust, and relevance systems that make Zambian businesses easy to find, verify, and choose — on Google and in AI search." />
    <meta property="og:image" content="https://kamedma.com/assets/brand/og-image.jpg" />
    <meta property="og:locale" content="en_ZM" />
    <meta property="og:site_name" content="KAME Digital Marketing Agency" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://kamedma.com/" />
    <meta property="twitter:title" content="KAME | Zambia's Leading Business Visibility Agency" />
    <meta property="twitter:description" content="KAME builds the visibility, trust, and relevance systems that make Zambian businesses easy to find, verify, and choose — on Google and in AI search." />
    <meta property="twitter:image" content="https://kamedma.com/assets/brand/og-image.jpg" />

    <meta name="theme-color" content="#1C3064" />
  </head>
  <body class="bg-surface text-ink font-sans antialiased">
    <div id="root"></div>
    <!--
      Netlify Forms detection: Netlify's build bots scan the built HTML for
      <form> tags with data-netlify="true". Because our real form is rendered
      client-side by React (see src/pages/Contact.jsx), we mirror its fields
      here in a hidden static form so Netlify registers it at build time.
      Do not remove this if you add/rename a field in the React contact form —
      update both together.
    -->
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="business" />
      <textarea name="message"></textarea>
    </form>
    <!--
      Same detection pattern for the KAME Visibility Pro waiting list form
      (see src/pages/Pricing.jsx). Keep fields in sync with that component.
    -->
    <form name="waiting-list" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="business" />
      <input type="text" name="plan" />
    </form>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
